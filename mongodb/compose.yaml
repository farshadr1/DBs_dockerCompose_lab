name: mongodb
services:
  mongodb:
    image: mongodb/mongodb-community-server:8.2-ubuntu2204-slim
    hostname: mongodb
    ports:
      - "27017:27017"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend
    volumes:
      - type: bind
        source: ./config/init.js
        target: /docker-entrypoint-initdb.d/init.js
        read_only: true
      - type: volume
        source: mongo-data
        target: /data/db  
  tools:
    build:
      context: ./tools
      dockerfile: Dockerfile.mongoTools
    hostname: tools
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - backend
    volumes:
      - type: bind
        source: ./backup_files/
        target: /backup_files/
    
volumes:
  mongo-data:
networks:
  backend: 