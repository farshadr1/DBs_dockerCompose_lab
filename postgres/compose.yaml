name: postgres
services:
  postgres:
    image: postgres:18.4
    hostname: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]      
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend
    volumes:
      - type: volume
        source: pg-data
        target: /var/lib/postgresql

networks:
  backend:
volumes:
  pg-data: